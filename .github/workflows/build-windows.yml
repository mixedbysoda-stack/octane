name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE (pinned to the version we build against locally)
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      # The WebView GUI needs the WebView2 SDK at CONFIGURE time — JUCE's
      # find_package(WebView2) globs *Microsoft.Web.WebView2* under
      # JUCE_WEBVIEW2_PACKAGE_LOCATION.
      - name: Install WebView2 SDK
        shell: pwsh
        run: nuget install Microsoft.Web.WebView2 -OutputDirectory "${{ github.workspace }}\packages"

      - name: Get version from CMakeLists.txt
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^project(Octane VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Windows = VST3 (+ Standalone). No AAX (needs separate PACE Windows wrap).
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCOPY_AFTER_BUILD=OFF -DJUCE_WEBVIEW2_PACKAGE_LOCATION="${{ github.workspace }}/packages"

      - name: Build VST3
        run: cmake --build build --config Release --target Octane_VST3 --parallel

      - name: Package VST3
        shell: bash
        run: |
          mkdir -p dist
          cd "build/Octane_artefacts/Release/VST3"
          7z a -tzip "$GITHUB_WORKSPACE/dist/FIZZFUEL-v${{ steps.version.outputs.version }}-Windows-VST3.zip" "FIZZFUEL.vst3"

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: FIZZFUEL-Windows-VST3
          path: dist/FIZZFUEL-v*-Windows-VST3.zip

      - name: Attach to release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FIZZFUEL-v*-Windows-VST3.zip
