name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone JUCE (pinned to the version we build against locally)
        run: git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git JUCE

      - name: Get version from CMakeLists.txt
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^project(Octane VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      # ---------- PAID BUILD ----------
      - name: Configure (paid)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCOPY_AFTER_BUILD=OFF

      - name: Build (paid)
        run: cmake --build build --config Release --parallel

      - name: Collect paid artifacts
        shell: bash
        run: |
          mkdir -p dist/Windows/VST3 dist/Windows/Standalone
          cp -r "build/Octane_artefacts/Release/VST3/OCTANE.vst3" dist/Windows/VST3/ || true
          cp "build/Octane_artefacts/Release/Standalone/OCTANE.exe" dist/Windows/Standalone/ || true

      - name: Update Inno Setup version (paid)
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/AppVersion=.*/AppVersion=$VERSION/" installer/windows/octane.iss
          sed -i "s/AppVerName=.*/AppVerName=OCTANE v$VERSION/" installer/windows/octane.iss
          sed -i "s/OutputBaseFilename=.*/OutputBaseFilename=OCTANE-v$VERSION-Windows-Installer/" installer/windows/octane.iss

      - name: Build Installer (paid)
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\octane.iss

      # ---------- DEMO BUILD ----------
      - name: Configure (demo)
        run: cmake -B build-demo -DCMAKE_BUILD_TYPE=Release -DBUILD_DEMO=ON -DCOPY_AFTER_BUILD=OFF

      - name: Build (demo)
        run: cmake --build build-demo --config Release --parallel

      - name: Collect demo artifacts
        shell: bash
        run: |
          mkdir -p dist/Windows-Demo/VST3 dist/Windows-Demo/Standalone
          cp -r "build-demo/Octane_artefacts/Release/VST3/OCTANE.vst3" dist/Windows-Demo/VST3/ || true
          cp "build-demo/Octane_artefacts/Release/Standalone/OCTANE.exe" dist/Windows-Demo/Standalone/ || true

      - name: Build Demo Installer
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp installer/windows/octane.iss installer/windows/octane-demo.iss
          sed -i "s|dist\\\\Windows\\\\VST3|dist\\\\Windows-Demo\\\\VST3|g" installer/windows/octane-demo.iss
          sed -i "s|dist\\\\Windows\\\\Standalone|dist\\\\Windows-Demo\\\\Standalone|g" installer/windows/octane-demo.iss
          sed -i "s|AppName=OCTANE|AppName=OCTANE Demo|" installer/windows/octane-demo.iss
          sed -i "s|DefaultDirName={autopf}\\\\Carbonated Audio\\\\OCTANE|DefaultDirName={autopf}\\\\Carbonated Audio\\\\OCTANE Demo|" installer/windows/octane-demo.iss
          sed -i "s/OutputBaseFilename=.*/OutputBaseFilename=OCTANE-v$VERSION-Demo-Windows-Installer/" installer/windows/octane-demo.iss

      - name: Build Demo Installer (Inno)
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\octane-demo.iss

      # ---------- UPLOAD ARTIFACTS ----------
      - name: Upload paid VST3
        uses: actions/upload-artifact@v4
        with:
          name: OCTANE-Windows-VST3
          path: dist/Windows/VST3/

      - name: Upload paid Installer
        uses: actions/upload-artifact@v4
        with:
          name: OCTANE-Windows-Installer
          path: dist/Windows/Installer/OCTANE-v*-Windows-Installer.exe

      - name: Upload demo Installer
        uses: actions/upload-artifact@v4
        with:
          name: OCTANE-Demo-Windows-Installer
          path: dist/Windows/Installer/OCTANE-v*-Demo-Windows-Installer.exe

      # ---------- RELEASE ----------
      - name: Zip paid artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cd dist/Windows && 7z a -tzip ../../OCTANE-Windows.zip VST3/ Standalone/

      - name: Upload paid Release (non-demo tags)
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'demo')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OCTANE-Windows.zip
            dist/Windows/Installer/OCTANE-v*-Windows-Installer.exe

      - name: Upload demo Release (demo tags)
        if: contains(github.ref, 'demo')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Windows/Installer/OCTANE-v*-Demo-Windows-Installer.exe
